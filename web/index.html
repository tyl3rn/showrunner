<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>automated-shorts</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
    background: #fafafa; color: #111;
    max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px;
    font-size: 14px; line-height: 1.5;
  }
  h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  h2 { font-size: 12px; font-weight: 600; text-transform: uppercase;
       letter-spacing: 0.08em; color: #666; margin: 40px 0 12px; }
  header { display: flex; justify-content: space-between; align-items: baseline;
           border-bottom: 1px solid #ddd; padding-bottom: 12px; }
  header span { color: #888; font-size: 12px; }

  form { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-top: 16px; }
  label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: #666; }
  input, select {
    font: inherit; padding: 6px 8px; border: 1px solid #ccc; background: #fff;
    color: #111; border-radius: 0;
  }
  input:focus, select:focus { outline: 1px solid #111; }
  button {
    font: inherit; padding: 7px 14px; border: 1px solid #111; background: #fff;
    color: #111; cursor: pointer; border-radius: 0;
  }
  button:hover:not(:disabled) { background: #111; color: #fff; }
  button:disabled { border-color: #ccc; color: #aaa; cursor: default; }

  #status { border: 1px solid #ddd; background: #fff; padding: 12px; margin-top: 16px; }
  #stage { font-weight: 600; }
  #elapsed { color: #888; margin-left: 8px; }
  #log {
    margin-top: 10px; max-height: 220px; overflow-y: auto; white-space: pre-wrap;
    font-size: 12px; color: #444; background: #f4f4f4; padding: 10px;
    border: 1px solid #e5e5e5;
  }

  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .card { border: 1px solid #ddd; background: #fff; display: flex; flex-direction: column; }
  .card video { width: 100%; aspect-ratio: 9 / 16; background: #000; display: block; }
  .card .body { padding: 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .card .title { font-weight: 600; font-size: 13px; }
  .card .meta { font-size: 11px; color: #888; }
  .card .caption {
    font-size: 12px; color: #444; background: #f4f4f4; border: 1px solid #e5e5e5;
    padding: 8px; max-height: 72px; overflow-y: auto;
  }
  .card .row { display: flex; gap: 6px; align-items: center; }
  .card .row.small button { padding: 4px 10px; font-size: 12px; }
  .stars { display: flex; gap: 4px; }
  .stars button { width: 30px; padding: 4px 0; font-size: 12px; }
  .stars button.sel { background: #111; color: #fff; }
  .note { flex: 1; font-size: 12px; padding: 5px 8px; }
  .flash { font-size: 11px; color: #666; }
  .empty { color: #888; padding: 24px 0; }
</style>
</head>
<body>

<header>
  <h1>automated-shorts</h1>
  <span>pipeline console</span>
</header>

<h2>Generate</h2>
<form id="genform">
  <label>subreddit
    <select id="subselect">
      <option value="auto" selected>auto (rotate pool)</option>
      <option value="TrueOffMyChest">TrueOffMyChest</option>
      <option value="confession">confession</option>
      <option value="confessions">confessions</option>
      <option value="AmItheAsshole">AmItheAsshole</option>
      <option value="AITAH">AITAH</option>
      <option value="tifu">tifu</option>
      <option value="nosleep">nosleep</option>
      <option value="LetsNotMeet">LetsNotMeet</option>
      <option value="AskReddit">AskReddit</option>
      <option value="offmychest">offmychest</option>
      <option value="TwoHotTakes">TwoHotTakes</option>
      <option value="pettyrevenge">pettyrevenge</option>
      <option value="ProRevenge">ProRevenge</option>
      <option value="MaliciousCompliance">MaliciousCompliance</option>
      <option value="entitledparents">entitledparents</option>
      <option value="Glitch_in_the_Matrix">Glitch_in_the_Matrix</option>
      <option value="custom">custom...</option>
    </select>
  </label>
  <label id="customwrap" hidden>custom subreddit
    <input id="subreddit" size="16" spellcheck="false" placeholder="name only, no r/">
  </label>
  <label>time window
    <select id="timefilter">
      <option value="hour">hour</option>
      <option value="day" selected>day</option>
      <option value="week">week</option>
      <option value="month">month</option>
      <option value="year">year</option>
      <option value="all">all time</option>
    </select>
  </label>
  <label>max videos
    <input id="maxvideos" type="number" value="3" min="1" max="5" style="width:70px">
  </label>
  <label>min score
    <input id="minscore" type="number" value="65" min="0" max="100" style="width:70px">
  </label>
  <button id="genbtn" type="submit">Generate</button>
</form>

<div id="status" hidden>
  <div><span id="stage"></span><span id="elapsed"></span></div>
  <pre id="log"></pre>
</div>

<h2>Library</h2>
<div id="grid"></div>
<div id="empty" class="empty" hidden>No videos yet. Run a generation above.</div>

<script>
const $ = id => document.getElementById(id);
let polling = null;
let wasRunning = false;

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
  return res.json();
}

$("subselect").addEventListener("change", () => {
  $("customwrap").hidden = $("subselect").value !== "custom";
  if (!$("customwrap").hidden) $("subreddit").focus();
});

$("genform").addEventListener("submit", async e => {
  e.preventDefault();
  const sel = $("subselect").value;
  const sub = sel === "custom" ? ($("subreddit").value.trim() || "auto") : sel;
  try {
    await api("/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        subreddit: sub,
        time_filter: $("timefilter").value,
        max_videos: parseInt($("maxvideos").value, 10),
        min_score: parseInt($("minscore").value, 10),
      }),
    });
    startPolling();
  } catch (err) { alert(err.message); }
});

function startPolling() {
  if (polling) clearInterval(polling);
  polling = setInterval(pollJob, 2000);
  pollJob();
}

async function pollJob() {
  const j = await api("/api/job");
  $("status").hidden = !(j.running || j.log);
  $("genbtn").disabled = j.running;
  $("stage").textContent = j.running ? "running: " + j.stage : j.stage;
  $("elapsed").textContent = j.elapsed ? Math.floor(j.elapsed / 60) + "m " + (j.elapsed % 60) + "s" : "";
  const logEl = $("log");
  const atBottom = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 20;
  logEl.textContent = j.log;
  if (atBottom) logEl.scrollTop = logEl.scrollHeight;
  if (wasRunning && !j.running) loadVideos();
  wasRunning = j.running;
  if (!j.running && polling && !wasRunning) { /* keep light polling for external runs */ }
}

async function loadVideos() {
  const vids = await api("/api/videos");
  $("empty").hidden = vids.length > 0;
  const grid = $("grid");
  grid.innerHTML = "";
  for (const v of vids) grid.appendChild(card(v));
}

function card(v) {
  const el = document.createElement("div");
  el.className = "card";

  const video = document.createElement("video");
  video.src = "/api/video/" + encodeURIComponent(v.file);
  video.controls = true;
  video.preload = "metadata";
  el.appendChild(video);

  const body = document.createElement("div");
  body.className = "body";

  const title = document.createElement("div");
  title.className = "title";
  title.textContent = v.title;
  body.appendChild(title);

  const meta = document.createElement("div");
  meta.className = "meta";
  const bits = [];
  if (v.subreddit) bits.push("r/" + v.subreddit);
  if (v.judged_score != null) bits.push("judged " + v.judged_score);
  if (v.category) bits.push(v.category);
  if (v.ending_rewritten) bits.push("twist ending");
  bits.push(v.created);
  meta.textContent = bits.join("  |  ");
  body.appendChild(meta);

  if (v.tiktok_caption) {
    const cap = document.createElement("div");
    cap.className = "caption";
    cap.textContent = v.tiktok_caption;
    body.appendChild(cap);

    const copyRow = document.createElement("div");
    copyRow.className = "row small";
    const copyBtn = document.createElement("button");
    copyBtn.textContent = "Copy TikTok caption";
    copyBtn.onclick = async () => {
      await navigator.clipboard.writeText(v.tiktok_caption);
      copyBtn.textContent = "Copied";
      setTimeout(() => copyBtn.textContent = "Copy TikTok caption", 1200);
    };
    copyRow.appendChild(copyBtn);
    body.appendChild(copyRow);
  }

  const rateRow = document.createElement("div");
  rateRow.className = "row";
  const stars = document.createElement("div");
  stars.className = "stars";
  const flash = document.createElement("span");
  flash.className = "flash";
  const note = document.createElement("input");
  note.className = "note";
  note.placeholder = "note for the judge (optional)";
  note.value = v.note || "";

  for (let n = 1; n <= 5; n++) {
    const b = document.createElement("button");
    b.textContent = n;
    if (v.rating === n) b.classList.add("sel");
    b.onclick = async () => {
      await api("/api/rate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({video: v.file, rating: n, note: note.value}),
      });
      stars.querySelectorAll("button").forEach(x => x.classList.remove("sel"));
      b.classList.add("sel");
      flash.textContent = "saved, the judge will remember";
      setTimeout(() => flash.textContent = "", 2000);
    };
    stars.appendChild(b);
  }
  rateRow.appendChild(stars);
  rateRow.appendChild(note);
  body.appendChild(rateRow);
  body.appendChild(flash);

  el.appendChild(body);
  return el;
}

loadVideos();
startPolling();
</script>
</body>
</html>
